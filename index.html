<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مولد الإعلانات</title>
  <style>
    body {
      font-family: Arial;
      direction: rtl;
      background: #f5f5f5;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      white-space: pre-line;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>مولد الإعلانات</h2>

  <input id="type" placeholder="نوع النشاط (مطعم، متجر...)">
  <input id="name" placeholder="اسم المشروع">
  <input id="offer" placeholder="العرض أو الخدمة">

  <button onclick="generate()">توليد الإعلان</button>

  <div class="result" id="result"></div>
</div>

<script>
function generate() {
  let type = document.getElementById("type").value;
  let name = document.getElementById("name").value;
  let offer = document.getElementById("offer").value;

  let ad1 = "🔥 عرض خاص من " + name + "! استمتع الآن بـ " + offer + " على أفضل " + type + ".";
  let ad2 = "لا تفوت الفرصة 😍 " + name + " يقدم لك " + offer + " لفترة محدودة!";
  let ad3 = "هل تبحث عن أفضل " + type + "؟ " + name + " هو خيارك مع " + offer + ".";

  let hashtags = "#عروض #تخفيضات #" + type;

  document.getElementById("result").innerText =
    ad1 + "\n\n" + ad2 + "\n\n" + ad3 + "\n\n" + hashtags;
}
</script>

</body>
</html>

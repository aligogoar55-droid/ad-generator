<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ad Generator</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b1220;
  color: #e5e7eb;
  direction: rtl;
}

.container {
  max-width: 800px;
  margin: 50px auto;
  padding: 20px;
}

.card {
  background: #111a2e;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 28px;
}

.subtitle {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border: 1px solid #22304a;
  border-radius: 10px;
  background: #0b1220;
  color: white;
  outline</head>

<body>

<div class="container">
  <h1>مولد الإعلانات الذكي</h1>

  <input id="type" placeholder="نوع النشاط (مطعم، متجر...)">
  <input id="name" placeholder="اسم المشروع">
  <input id="offer" placeholder="العرض أو الخدمة">

  <button onclick="generate()">توليد الإعلانات</button>

  <div class="result" id="result"></div>
</div>

<script>
function generate() {

  let type = document.getElementById("type").value;
  let name = document.getElementById("name").value;
  let offer = document.getElementById("offer").value;

  let ad1 = "🔥 عرض خاص من " + name + " الآن! احصل على " + offer + " على أفضل " + type + ".";
  let ad2 = "لا تفوت الفرصة 😍 " + name + " يقدم لك " + offer + " لفترة محدودة فقط!";
  let ad3 = "أفضل " + type + " عند " + name + " مع عرض: " + offer + ".";

  let hashtags = "#عروض #تخفيضات #" + type;

  document.getElementById("result").innerText =
    ad1 + "\n\n" + ad2 + "\n\n" + ad3 + "\n\n" + hashtags;
}
</script>

</body>
</html>

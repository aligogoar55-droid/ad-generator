<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ad Generator SaaS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  direction: rtl;
}

.container {
  max-width: 600px;
  margin: 60px auto;
  background: #111827;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.result {
  margin-top: 20px;
  background: #1f2937;
  padding: 15px;
  border-radius: 8px;
  white-space: pre-line;
}
</style>

</head>

<body>

<div class="container">
  <h1>مولد الإعلانات الذكي</h1>

  <input id="type" placeholder="نوع النشاط (مطعم، متجر...)">
  <input id="name" placeholder="اسم المشروع">
  <input id="offer" placeholder="العرض أو الخدمة">

  <button onclick="generate()">توليد الإعلانات</button>

  <div class="result" id="result"></div>
</div>

<script>
function generate() {

  let type = document.getElementById("type").value;
  let name = document.getElementById("name").value;
  let offer = document.getElementById("offer").value;

  let ad1 = "🔥 عرض خاص من " + name + " الآن! احصل على " + offer + " على أفضل " + type + ".";
  let ad2 = "لا تفوت الفرصة 😍 " + name + " يقدم لك " + offer + " لفترة محدودة فقط!";
  let ad3 = "أفضل " + type + " عند " + name + " مع عرض: " + offer + ".";

  let hashtags = "#عروض #تخفيضات #" + type;

  document.getElementById("result").innerText =
    ad1 + "\n\n" + ad2 + "\n\n" + ad3 + "\n\n" + hashtags;
}
</script>

</body>
</html>
